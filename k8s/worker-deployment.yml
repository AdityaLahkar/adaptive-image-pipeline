apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: worker-service

  template:

    metadata:
      labels:
        app: worker-service

    spec:

      containers:

      - name: worker-service

        image: adityalahkar/worker-service:latest

        imagePullPolicy: Always

        env:

        - name: REDIS_HOST
          value: redis

        - name: REDIS_PORT
          value: "6379"
